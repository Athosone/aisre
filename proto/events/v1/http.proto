syntax = "proto3";
package events.v1;

option go_package = "github.com/athosone/aisre/proto/events/v1;eventsv1";

message HTTPEvent {
  uint64 timestamp_ns = 1;
  ProcessInfo process = 2;
  ConnectionInfo connection = 3;
  HTTPRequest request = 4;
  HTTPResponse response = 5;
  uint64 latency_ns = 6;
}

message ProcessInfo {
  uint32 pid = 1;
  uint32 tid = 2;
  uint32 uid = 3;
  string comm = 4;
}

message ConnectionInfo {
  string src_ip = 1;
  uint32 src_port = 2;
  string dst_ip = 3;
  uint32 dst_port = 4;
}

message Header {
  string key = 1;
  string value = 2;
}

message HTTPRequest {
  string method = 1;
  string path = 2;
  string version = 3;
  repeated Header headers = 4;
  bytes partial_body = 5;
  uint32 total_body_length = 6;
}

message HTTPResponse {
  uint32 status_code = 1;
  string status_text = 2;
  string version = 3;
  repeated Header headers = 4;
  bytes partial_body = 5;
  uint32 total_body_length = 6;
}
